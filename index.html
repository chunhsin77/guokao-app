<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>國考默寫系統</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2c3e50">

<style>
body{
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    margin:20px;
}
button{
    padding:10px;
    margin:5px 0;
    width:100%;
    font-size:16px;
}
.box{
    border:1px solid #ccc;
    padding:10px;
    margin:10px 0;
    white-space:pre-wrap;
}
textarea{
    width:100%;
    height:150px;
}
</style>
</head>

<body>

<h2>國考默寫系統</h2>

<button onclick="loadRandom()">隨機出題</button>

<div class="box">
<b>科目：</b><span id="subject"></span><br>
<b>主題：</b><span id="topic"></span><br>
<b>年度：</b><span id="year"></span>
</div>

<div class="box" id="content"></div>

<textarea id="answerInput" placeholder="請在此默寫..."></textarea>

<button onclick="checkAnswer()">比對答案</button>

<script>
let questionsData = [];

fetch("./questions.json")
.then(res => res.json())
.then(data => {
    questionsData = data.questions;
})
.catch(err => {
    alert("載入題庫失敗");
    console.error(err);
});

function loadRandom(){
    if(questionsData.length === 0){
        alert("題庫尚未載入完成");
        return;
    }

    const randomIndex = Math.floor(Math.random() * questionsData.length);
    const q = questionsData[randomIndex];

    document.getElementById("subject").innerText = q.subject;
    document.getElementById("topic").innerText = q.topic;
    document.getElementById("year").innerText = q.year;
    document.getElementById("content").innerText = q.content;

    document.getElementById("answerInput").value = "";
}

function checkAnswer(){
    const original = document.getElementById("content").innerText.trim();
    const userInput = document.getElementById("answerInput").value.trim();

    if(original === userInput){
        alert("完全正確！");
    }else{
        alert("內容不完全相同，請再檢查。");
    }
}
</script>

</body>
</html>
